<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>即時天氣查詢</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">純前端天氣查詢</p>
        <h1>輸入城市名稱，立即查詢天氣</h1>
        <p>本專題示範 HTML、CSS、JavaScript 與 OpenWeather API 的串接。</p>
      </div>
    </header>

    <main>
      <section class="search-panel">
        <label for="cityInput">城市名稱</label>
        <div class="search-box">
          <input id="cityInput" type="text" placeholder="例如：Taipei、台北、Tokyo、東京" />
          <button id="searchButton">查詢</button>
        </div>
        <div class="action-row">
          <button id="autoFillButton" class="secondary-button">自動填入測試城市</button>
          <button id="clearButton" class="secondary-button">清除資料</button>
        </div>
        <p class="hint">請輸入英文或中文城市名稱後按「查詢」或按 Enter。若先前查詢過，頁面載入時會自動重新顯示。</p>
        <p class="api-note">請先在 <code>script.js</code> 內填入 OpenWeather API Key 與 Google Apps Script Web App URL。</p>
      </section>

      <section class="weather-card hidden" id="weatherCard">
        <div class="weather-header">
          <div>
            <p class="weather-city" id="cityName"></p>
            <p class="weather-desc" id="weatherDescription"></p>
          </div>
          <div class="weather-temp" id="temperature"></div>
        </div>

        <div class="weather-details">
          <div class="detail-item">
            <span>濕度</span>
            <strong id="humidity"></strong>
          </div>
          <div class="detail-item">
            <span>風速</span>
            <strong id="windSpeed"></strong>
          </div>
          <div class="detail-item">
            <span>氣壓</span>
            <strong id="pressure"></strong>
          </div>
          <div class="detail-item">
            <span>天氣代碼</span>
            <strong id="weatherCode"></strong>
          </div>
        </div>

        <div class="save-row">
          <button id="saveButton">儲存到 Google 試算表</button>
          <p class="save-note">已取得資料後，可按此將結果送到 Apps Script。</p>
        </div>
      </section>

      <div class="message" id="message"></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
